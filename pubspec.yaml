name: passmanager
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  auto_size_text: ^3.0.0
  google_fonts: ^6.2.1
  ml_card_scanner: ^0.2.3
  supabase_flutter: ^2.9.1
  shared_preferences: ^2.5.3 # theme + biometric pref persistence
  crypto: ^3.0.3
  local_auth: ^2.3.0 # biometric authentication
  uuid: ^4.5.1
  font_awesome_flutter: ^10.8.0
  pointycastle: ^3.9.1
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/logos/brands/
