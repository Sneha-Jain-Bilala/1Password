name: passmanager
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3
  auto_size_text: ^3.0.0
  google_fonts: ^8.1.0
  ml_card_scanner: ^0.2.3
  supabase_flutter: ^2.9.1
  shared_preferences: ^2.5.3 # theme + biometric pref persistence
  crypto: ^3.0.3
  local_auth: ^3.0.1 # biometric authentication
  uuid: ^4.5.1
  font_awesome_flutter: ^11.0.0
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/logos/brands/
