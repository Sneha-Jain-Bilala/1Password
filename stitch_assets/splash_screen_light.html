<div class="absolute inset-0 bg-gradient-to-br from-primary to-secondary opacity-10"></div>

<div class="relative flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-6xl md:text-7xl bg-gradient-to-br from-primary via-primary-container to-secondary bg-clip-text text-transparent" style="font-variation-settings: 'FILL' 1;">

<div class="absolute top-[55%] left-1/2 -translate-x-1/2 w-3 h-5 bg-white/90 rounded-full blur-[2px]"></div>
<div class="absolute top-[58%] left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-tertiary rounded-full"></div>
</div>
</div>

<div class="absolute -top-4 -right-4 w-12 h-12 bg-surface-container-lowest/80 backdrop-blur-md rounded-2xl shadow-xl flex items-center justify-center border border-outline-variant/10">

</div>
