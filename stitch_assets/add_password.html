<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->

<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 transition-colors">

</button>
<h1 class="font-headline font-semibold tracking-tight text-lg text-primary">Add Password</h1>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-10">

<div class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
<div class="flex flex-col items-center gap-2 shrink-0">

</div>
<div class="flex flex-col items-center gap-2 shrink-0">
<div class="w-14 h-14 bg-surface-container-high rounded-2xl flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer">
<img alt="Gmail logo" class="w-8 h-8 rounded-md" data-alt="Gmail brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD40Ju9ScewzDTyoQQJfsVQDGBoJ_hBX9K6sDjfQmfeiZWZgBIE52aq7FgMbyw5N3pstxS7Y7yiiODR7qI9h5LKGie3qzHzolWhzfvHbi4FDYJ5u48MgyaTOCI_pm1i73OlY1yxr2qtNs0Xyt_FBXlHmxhcJ2Qlz_mbgW4amo5jfd49zcHBsxwnhKTfUjH88v4tiTYip7DLdXGLlI-HHbF4O9XPEAwIrubTN4M1tj5fDSqo93TXr9zEHbB9tMWUQ42WcqQyisSBdy6j"/>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">Gmail</span>
</div>
<div class="flex flex-col items-center gap-2 shrink-0">
<div class="w-14 h-14 bg-surface-container-high rounded-2xl flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer">
<img alt="Instagram logo" class="w-8 h-8 rounded-md" data-alt="Instagram brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYkQXI-KSYOXQACXq6klZM09XfJg4zs0_LQB-KWWmKsdj6DjF1JVeA9kgf9sjp5FIUVXNFtTl6iof0iAue0fCaoFPkcA2u3Rdc7NSY0LW3GLIfajdLtZ5c2axWE7erS_Q8_Lhe2FeVhVc6MkNUJTyFqlpIVCtKwP9N6QN5FXh8SH32QPI_suet3URJxYtyILfPateychaHt0xSlR1a3CRXKOXdg2SWj2AjhrWMjY7eLlhmVcTy5663RPl_vFASH3yhEyRwYduBqq_W"/>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">Instagram</span>
</div>
<div class="flex flex-col items-center gap-2 shrink-0">
<div class="w-14 h-14 bg-surface-container-high rounded-2xl flex items-center justify-center border border-dashed border-outline-variant hover:border-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined text-outline">add</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">Custom</span>
</div>
</div>
</section>
<!-- Login Details Section -->
<section class="space-y-4">
<h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline px-1">Identity &amp; Credentials</h2>
<div class="space-y-3">
<!-- Username Field -->
<div class="recessed-input rounded-xl p-4 flex flex-col gap-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-primary/70">Email or Username</label>
<input class="bg-transparent border-none p-0 text-on-surface focus:ring-0 font-medium" type="text" value="alex.vanguard@design.com"/>
</div>
<!-- Password Field Group -->
<div class="space-y-3">
<div class="recessed-input rounded-xl p-4 flex flex-col gap-1 relative">
<label class="text-[10px] font-bold uppercase tracking-widest text-primary/70">Password</label>
<div class="flex items-center justify-between">
<input class="bg-transparent border-none p-0 text-on-surface focus:ring-0 font-medium w-full" type="password" value="••••••••••••"/>
<button class="text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between px-1">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-secondary/10 border border-secondary/20">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<span class="text-[10px] font-bold uppercase tracking-widest text-secondary">Strong</span>
</div>
<button class="text-[10px] font-bold uppercase tracking-widest text-primary-container border border-primary-container/30 px-4 py-2 rounded-lg hover:bg-primary/5 transition-colors">
                            Generate Password
                        </button>
</div>
</div>
<!-- 2FA Chip -->
<button class="flex items-center gap-2 px-4 py-3 rounded-xl bg-secondary-container/10 border border-secondary-container/20 hover:bg-secondary-container/20 transition-all group w-full">
<span class="material-symbols-outlined text-secondary-container">add_moderator</span>
<span class="text-sm font-semibold text-secondary-container">Add 2FA Code</span>
</button>
</div>
</section>
<!-- Connectivity Section -->
<section class="space-y-4">
<h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline px-1">Location &amp; Context</h2>
<div class="space-y-3">
<div class="recessed-input rounded-xl p-4 flex flex-col gap-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-primary/70">Website / App URL</label>
<input class="bg-transparent border-none p-0 text-on-surface focus:ring-0 font-medium" placeholder="https://example.com" type="text"/>
</div>
<div class="flex items-center justify-between p-4 bg-surface-container-high rounded-xl hover:bg-surface-bright transition-colors cursor-pointer">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">folder_open</span>
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">Folder</span>
<span class="text-sm font-medium">Personal Accounts</span>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</div>
</section>
<!-- Custom Fields & Notes -->
<section class="space-y-4">
<h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline px-1">Additional Information</h2>
<div class="space-y-3">
<div class="recessed-input rounded-xl p-4 flex flex-col gap-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-primary/70">Notes</label>
<textarea class="bg-transparent border-none p-0 text-on-surface focus:ring-0 font-medium resize-none text-sm" placeholder="Add security questions or context..." rows="3"></textarea>
</div>
<button class="flex items-center justify-center gap-2 w-full py-4 rounded-xl border border-dashed border-outline-variant hover:border-primary-container transition-all group">
<span class="material-symbols-outlined text-outline group-hover:text-primary-container transition-colors">add_circle</span>
<span class="text-sm font-bold uppercase tracking-widest text-outline group-hover:text-primary-container transition-colors">+ Add Field</span>
</button>
</div>
</section>
<!-- Delete Action (Editorial Offset) -->
<div class="pt-8 text-center">
<button class="text-[10px] font-bold uppercase tracking-widest text-tertiary-container hover:text-tertiary transition-colors">
                Delete this entry
            </button>
</div>
</main>
<!-- Navigation Shell (BottomNavBar) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#2a2933]/70 backdrop-blur-lg rounded-t-[28px] shadow-[0_-8px_32px_rgba(196,192,255,0.05)]">

<span class="material-symbols-outlined">home_max</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Home</span>

<a class="flex flex-col items-center justify-center text-slate-500 px-5 py-1.5 hover:text-white transition-all" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Browse</span>
</a>
