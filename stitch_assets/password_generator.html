<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .strength-bar {
            height: 6px;
            border-radius: 3px;
        }
        input[type='range'] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type='range']::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #464555;
            border-radius: 2px;
        }
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #c4c0ff;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(196, 192, 255, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full flex justify-between items-center px-6 h-16 bg-[#13121b]/80 backdrop-blur-xl z-50 shadow-[0_8px_32px_rgba(196,192,255,0.08)]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container/20 flex items-center justify-center overflow-hidden">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="User profile avatar icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxmfFKPX0fryREQzA2lB0LaFsfgCqvLseGoWa5hw0_blXOboFXbz8lITyq_OzcqO8Ojc9Fvff4WgTWtUNuvOScyASvFKFgEMfOLcIHz1ULYW9Z0KYHEa0odGkKb6Enh_H0R-qBoqMGQu7HQFsnyswL93WvDcDX5vAUzcm0ZJLjgpvpqTOY1F654YwGBSVElHTkOfJFlmo-FcUn9LzB2evZbg1Or5svYaHkgihy6FhIznhpPdB_kF3vBvUPtiCvtvhn9dq5SnGBGTap"/>
</div>
<span class="text-xl font-bold tracking-tighter text-[#c4c0ff] bg-clip-text font-headline">VaultKey</span>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#c4c0ff] p-2 hover:bg-white/5 transition-colors rounded-full">notifications</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Editorial Header -->
<section class="mb-10">
<h1 class="text-4xl font-extrabold tracking-tighter text-on-surface mb-2">Password Generator</h1>
<p class="text-on-surface-variant body-md leading-relaxed">Forge unbreakable cryptographic keys for your digital fortress.</p>
</section>
<!-- Generated Password Display -->
<section class="mb-8 relative group">
<div class="bg-surface-container-high rounded-3xl p-8 flex flex-col items-center justify-center gap-6 shadow-[0_16px_48px_rgba(0,0,0,0.4)] transition-all duration-300">
<div class="w-full text-center">
<span class="font-mono text-2xl md:text-3xl font-medium text-primary tracking-wider break-all leading-snug">
                        k9#vL2!mP8$zR4^nT7*qW
                    </span>
</div>
<div class="flex gap-4">
<button class="flex items-center gap-2 bg-surface-container-highest px-5 py-3 rounded-2xl hover:bg-surface-bright transition-all active:scale-95">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 0;">content_copy</span>
<span class="text-sm font-semibold uppercase tracking-widest text-on-surface-variant">Copy</span>
</button>
<button class="flex items-center gap-2 bg-surface-container-highest px-5 py-3 rounded-2xl hover:bg-surface-bright transition-all active:rotate-180 duration-500">
<span class="material-symbols-outlined text-primary">refresh</span>
<span class="text-sm font-semibold uppercase tracking-widest text-on-surface-variant">Regenerate</span>
</button>
</div>
</div>
</section>
<!-- Strength Meter -->
<section class="mb-10 px-2">
<div class="flex justify-between items-center mb-3">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Security Strength</span>
<span class="text-xs font-bold uppercase tracking-widest text-secondary">Impenetrable</span>
</div>
<div class="grid grid-cols-4 gap-2">
<div class="strength-bar bg-secondary"></div>
<div class="strength-bar bg-secondary"></div>
<div class="strength-bar bg-secondary"></div>
<div class="strength-bar bg-secondary"></div>
</div>
</section>
<!-- Configuration Controls -->
<div class="space-y-8">
<!-- Slider -->
<div class="bg-surface-container-low rounded-3xl p-6">
<div class="flex justify-between items-center mb-6">
<span class="text-on-surface font-semibold">Length</span>
<span class="text-primary font-mono text-xl font-bold">20 <span class="text-xs uppercase font-sans tracking-widest text-on-surface-variant ml-1">chars</span></span>
</div>
<input class="cursor-pointer" max="64" min="8" type="range" value="20"/>
</div>
<!-- Chips -->
<div class="space-y-4">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-2">Include Characters</span>
<div class="flex flex-wrap gap-3">
<!-- Active Chips -->
<button class="bg-primary/10 border border-primary/20 text-primary px-4 py-2.5 rounded-2xl text-sm font-bold flex items-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Uppercase
                    </button>
<button class="bg-primary/10 border border-primary/20 text-primary px-4 py-2.5 rounded-2xl text-sm font-bold flex items-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Lowercase
                    </button>
<button class="bg-primary/10 border border-primary/20 text-primary px-4 py-2.5 rounded-2xl text-sm font-bold flex items-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Numbers
                    </button>
<button class="bg-primary/10 border border-primary/20 text-primary px-4 py-2.5 rounded-2xl text-sm font-bold flex items-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Symbols
                    </button>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-12 space-y-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-fixed py-5 rounded-[14dp] font-bold text-lg shadow-[0_8px_24px_rgba(196,192,255,0.3)] active:scale-[0.98] transition-all">
                Use This Password
            </button>
<button class="w-full bg-transparent border border-outline-variant/20 text-on-surface-variant py-5 rounded-[14dp] font-bold text-lg hover:bg-white/5 active:scale-[0.98] transition-all">
                Generate Again
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#2a2933]/70 backdrop-blur-lg shadow-[0_-8px_32px_rgba(196,192,255,0.05)] rounded-t-[28px]">

<span class="material-symbols-outlined mb-1">home_max</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 px-5 py-1.5 hover:text-white transition-all active:translate-y-[-2px] duration-300">
<span class="material-symbols-outlined mb-1">grid_view</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Browse</span>
</button>
<button class="flex flex-col items-center justify-center bg-[#c4c0ff]/10 text-[#c4c0ff] rounded-2xl px-5 py-1.5 transition-all active:translate-y-[-2px] duration-300">
<span class="material-symbols-outlined mb-1">construction</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest text-[#c4c0ff]">Tools</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 px-5 py-1.5 hover:text-white transition-all active:translate-y-[-2px] duration-300">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Settings</span>
</button>
</nav>
