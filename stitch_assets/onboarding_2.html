<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#ffdad6",
              "on-tertiary": "#68000f",
              "secondary-container": "#00d1a7",
              "surface": "#13121b",
              "surface-container-lowest": "#0e0d16",
              "on-surface": "#e5e0ee",
              "surface-container": "#201e28",
              "outline": "#918fa1",
              "surface-container-high": "#2a2933",
              "surface-container-highest": "#35333e",
              "error-container": "#93000a",
              "secondary": "#41eec2",
              "tertiary-container": "#f16161",
              "on-secondary": "#00382b",
              "primary-container": "#8781ff",
              "tertiary-fixed": "#ffdad8",
              "primary-fixed": "#e3dfff",
              "on-surface-variant": "#c7c4d8",
              "on-background": "#e5e0ee",
              "on-primary-fixed": "#100069",
              "surface-container-low": "#1c1a24",
              "primary-fixed-dim": "#c4c0ff",
              "surface-dim": "#13121b",
              "error": "#ffb4ab",
              "inverse-on-surface": "#312f39",
              "secondary-fixed-dim": "#28dfb5",
              "on-tertiary-container": "#5c000c",
              "surface-variant": "#35333e",
              "tertiary-fixed-dim": "#ffb3b0",
              "on-primary-container": "#1b0091",
              "on-secondary-fixed": "#002118",
              "secondary-fixed": "#55fcd0",
              "background": "#13121b",
              "tertiary": "#ffb3b0",
              "on-primary-fixed-variant": "#3622ca",
              "on-tertiary-fixed-variant": "#8c1520",
              "inverse-primary": "#4f44e2",
              "primary": "#c4c0ff",
              "surface-tint": "#c4c0ff",
              "outline-variant": "#464555",
              "on-secondary-container": "#005441",
              "surface-bright": "#3a3842",
              "inverse-surface": "#e5e0ee",
              "on-primary": "#2000a4",
              "on-tertiary-fixed": "#410006",
              "on-secondary-fixed-variant": "#00513f",
              "on-error": "#690005"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .strength-gradient {
            background: linear-gradient(90deg, #f16161 0%, #ffb3b0 33%, #41eec2 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0F0E17] text-on-surface font-body min-h-screen flex items-center justify-center p-6 selection:bg-primary-container/30">
<!-- Onboarding Container -->
<main class="w-full max-w-[480px] relative">
<!-- Background Ambient Glow -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-secondary/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Central Card -->
<div class="bg-surface-container-high rounded-[32px] p-8 md:p-12 shadow-[0_32px_64px_rgba(0,0,0,0.4)] relative overflow-hidden">
<!-- Progress Indicator -->
<div class="flex gap-2 mb-10 justify-center">
<div class="h-1.5 w-12 rounded-full bg-primary/30"></div>
<div class="h-1.5 w-12 rounded-full bg-primary shadow-[0_0_12px_rgba(196,192,255,0.5)]"></div>
<div class="h-1.5 w-12 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Header Section -->
<div class="text-center mb-10">
<h1 class="text-3xl md:text-4xl font-headline font-extrabold tracking-tight text-on-surface mb-3">
                    Create Your Master Password
                </h1>
<p class="text-on-surface-variant text-base leading-relaxed max-w-[320px] mx-auto">
                    This is the main key to your vault. Make it strong and memorable.
                </p>
</div>
<!-- Form Section -->
<div class="space-y-8">
<!-- Password Field -->
<div class="space-y-3">
<div class="relative group">
<input class="w-full h-16 bg-surface-container-lowest border-none rounded-2xl px-6 text-lg text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="Enter master password" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
<!-- Active Glow Bottom Bar -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[90%] h-[2px] bg-secondary shadow-[0_0_15px_#41eec2] opacity-0 group-focus-within:opacity-100 transition-opacity"></div>
</div>
<!-- Strength Meter -->
<div class="space-y-2 px-1">
<div class="flex justify-between items-center mb-1">
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-outline">Password Strength</span>
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-secondary">Good</span>
</div>
<div class="h-1.5 w-full bg-surface-container-lowest rounded-full overflow-hidden">
<!-- Strength width set to 65% for "Good" state in this static mock -->
<div class="h-full w-[65%] strength-gradient rounded-full transition-all duration-500"></div>
</div>
</div>
</div>
<!-- Tips Chips -->
<div class="flex flex-wrap gap-2">
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-lowest rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-[14px] text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[11px] font-semibold text-on-surface-variant">12+ chars</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-lowest rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-[14px] text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[11px] font-semibold text-on-surface-variant">Symbols</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-lowest rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-[14px] text-outline/30" data-icon="circle">circle</span>
<span class="text-[11px] font-semibold text-outline">Numbers</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-lowest rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-[14px] text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[11px] font-semibold text-on-surface-variant">Uppercase</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-bold text-base rounded-[14dp] shadow-[0_8px_24px_rgba(135,129,255,0.3)] hover:scale-[1.02] active:scale-95 transition-all">
                    Continue
                </button>
<!-- Info Link -->
<div class="pt-2 text-center">
<a class="inline-flex items-center gap-2 text-outline hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-lg" data-icon="info">info</span>
<span class="text-sm font-medium border-b border-transparent group-hover:border-primary">What is a Master Password?</span>
</a>
</div>
</div>
<!-- Vault Aesthetic Decoration -->
<div class="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-8xl" data-icon="lock">lock</span>
</div>
</div>
<!-- Branding Footer -->
<div class="mt-8 text-center">
<p class="text-[12px] font-bold tracking-[0.2em] uppercase text-outline/40">
                VaultKey Secured Environment
            </p>
</div>
</main>
</body></html>
