<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#68000f",
                        "secondary-container": "#00d1a7",
                        "surface": "#13121b",
                        "surface-container-lowest": "#0e0d16",
                        "on-surface": "#e5e0ee",
                        "surface-container": "#201e28",
                        "outline": "#918fa1",
                        "surface-container-high": "#2a2933",
                        "surface-container-highest": "#35333e",
                        "error-container": "#93000a",
                        "secondary": "#41eec2",
                        "tertiary-container": "#f16161",
                        "on-secondary": "#00382b",
                        "primary-container": "#8781ff",
                        "tertiary-fixed": "#ffdad8",
                        "primary-fixed": "#e3dfff",
                        "on-surface-variant": "#c7c4d8",
                        "on-background": "#e5e0ee",
                        "on-primary-fixed": "#100069",
                        "surface-container-low": "#1c1a24",
                        "primary-fixed-dim": "#c4c0ff",
                        "surface-dim": "#13121b",
                        "error": "#ffb4ab",
                        "inverse-on-surface": "#312f39",
                        "secondary-fixed-dim": "#28dfb5",
                        "on-tertiary-container": "#5c000c",
                        "surface-variant": "#35333e",
                        "tertiary-fixed-dim": "#ffb3b0",
                        "on-primary-container": "#1b0091",
                        "on-secondary-fixed": "#002118",
                        "secondary-fixed": "#55fcd0",
                        "background": "#13121b",
                        "tertiary": "#ffb3b0",
                        "on-primary-fixed-variant": "#3622ca",
                        "on-tertiary-fixed-variant": "#8c1520",
                        "inverse-primary": "#4f44e2",
                        "primary": "#c4c0ff",
                        "surface-tint": "#c4c0ff",
                        "outline-variant": "#464555",
                        "on-secondary-container": "#005441",
                        "surface-bright": "#3a3842",
                        "inverse-surface": "#e5e0ee",
                        "on-primary": "#2000a4",
                        "on-tertiary-fixed": "#410006",
                        "on-secondary-fixed-variant": "#00513f",
                        "on-error": "#690005",
                        "amber-accent": "#FFB347"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-amber-gradient {
            background: linear-gradient(135deg, #FFB347 0%, #E69A32 100%);
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: rgba(32, 30, 40, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col overflow-x-hidden">
<!-- TopAppBar Suppressed for Transactional/Onboarding Flow as per Blueprint -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative">
<!-- Background Ambient Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-accent/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="max-w-xl w-full flex flex-col items-center text-center space-y-10 z-10">
<!-- Warning Header Cluster -->
<div class="flex flex-col items-center space-y-6">
<div class="w-20 h-20 rounded-3xl bg-amber-accent/10 flex items-center justify-center relative">
<span class="material-symbols-outlined text-[48px] text-amber-accent" style="font-variation-settings: 'FILL' 1;">warning</span>
<div class="absolute inset-0 rounded-3xl border border-amber-accent/20 animate-pulse"></div>
</div>
<div class="space-y-3">
<h1 class="text-4xl md:text-5xl font-headline font-extrabold tracking-tighter text-white">
                        Store Your Recovery Code
                    </h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-md mx-auto">
                        If you lose your Master Password and this code, <span class="text-amber-accent font-semibold">you lose your vault.</span>
</p>
</div>
</div>
<!-- Recovery Code Bento Card -->
<div class="w-full space-y-6">
<div class="surface-container-high rounded-[28px] p-8 md:p-12 relative overflow-hidden group shadow-[0_32px_64px_-12px_rgba(255,179,71,0.08)]">
<!-- Texture Overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none bg-[radial-gradient(circle_at_2px_2px,rgba(255,179,71,0.2)_1px,transparent_0)] bg-[length:24px_24px]"></div>
<div class="relative z-10">
<label class="text-[10px] uppercase tracking-[0.2em] font-bold text-amber-accent/60 mb-6 block">Your Immutable Key</label>
<div class="bg-surface-container-lowest border border-amber-accent/10 rounded-2xl p-6 md:p-8">
<code class="text-xl md:text-2xl lg:text-3xl font-mono font-bold tracking-[0.15em] text-amber-accent flex flex-wrap justify-center gap-2">
<span>XXXX</span>-<span>XXXX</span>-<span>XXXX</span>-<span>XXXX</span>-<span>XXXX</span>-<span>XXXX</span>
</code>
</div>
</div>
</div>
<!-- Secondary Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4">
<button class="flex-1 h-14 rounded-2xl border border-outline-variant/30 text-on-surface font-semibold flex items-center justify-center gap-2 hover:bg-white/5 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-xl">content_copy</span>
                        Copy Code
                    </button>
<button class="flex-1 h-14 rounded-2xl bg-amber-accent text-[#100069] font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-all active:scale-[0.98] shadow-lg shadow-amber-accent/20">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">download</span>
                        Download as PDF
                    </button>
</div>
</div>
<!-- Confirmation & Submission -->
<div class="w-full space-y-8 pt-4">
<label class="group flex items-center justify-center gap-4 cursor-pointer select-none">
<div class="relative">
<input class="peer hidden" id="recovery-check" type="checkbox"/>
<div class="w-6 h-6 rounded-lg border-2 border-outline-variant group-hover:border-amber-accent transition-colors peer-checked:bg-amber-accent peer-checked:border-amber-accent flex items-center justify-center">
<span class="material-symbols-outlined text-white text-lg scale-0 peer-checked:scale-100 transition-transform" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</div>
<span class="text-on-surface-variant font-medium group-hover:text-on-surface transition-colors">I have safely stored my recovery code</span>
</label>
<button class="w-full h-16 rounded-2xl bg-surface-container-highest text-outline font-bold text-lg cursor-not-allowed transition-all shadow-xl" disabled="">
                    Continue
                </button>
<p class="text-[11px] text-outline-variant uppercase tracking-widest font-bold">Step 3 of 4: Encryption Layer</p>
</div>
</div>
</main>
<!-- BottomNavBar and FAB Suppressed for Onboarding context as per filtering rules -->
<!-- Abstract Identity Elements -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-accent/50 to-transparent"></div>
<div class="fixed top-20 -right-20 w-64 h-64 bg-amber-accent/10 blur-[100px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-10 -left-20 w-80 h-80 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
</body></html>
