<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .biometric-glow {
      box-shadow: 0 0 60px 10px rgba(196, 192, 255, 0.15);
    }
    /* Intentional Asymmetry: Editorial layouts often use offset positions */
    .asymmetric-offset {
      transform: translateY(-2rem);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- Top Navigation (Shell Suppressed per Rule: Transactional Onboarding) -->
<header class="w-full flex justify-between items-center px-6 h-20">
<div class="text-xl font-bold tracking-tighter text-primary">VaultKey</div>
<div class="text-on-surface-variant font-label text-xs tracking-widest font-semibold">STEP 04/04</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 relative overflow-hidden">
<!-- Ambient Background Texture -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="w-full max-w-md flex flex-col items-center asymmetric-offset">
<!-- Biometric Core -->
<div class="relative mb-16">
<!-- Circular Surface Layers -->
<div class="w-48 h-48 rounded-full bg-surface-container-high flex items-center justify-center biometric-glow relative z-10">
<div class="w-40 h-40 rounded-full bg-surface-container-highest flex items-center justify-center">
<!-- Icon with literal transcription -->
<span class="material-symbols-outlined text-primary text-[80px]" data-icon="fingerprint">fingerprint</span>
</div>
</div>
<!-- Animated Visual Aura (Stateless CSS alternative) -->
<div class="absolute top-0 left-0 w-48 h-48 rounded-full border-2 border-primary/20 scale-125 opacity-20"></div>
<div class="absolute top-0 left-0 w-48 h-48 rounded-full border border-primary/10 scale-150 opacity-10"></div>
</div>
<!-- Editorial Typography -->
<div class="text-center space-y-4 mb-12">
<h1 class="text-4xl font-headline font-bold tracking-tight text-on-surface leading-tight">
          Enable Fingerprint Unlock
        </h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-[280px] mx-auto">
          Skip the Master Password — unlock VaultKey in under a second.
        </p>
</div>
<!-- Interactive Zone -->
<div class="w-full space-y-6">
<!-- Primary Action: Gradient Polish -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-headline font-bold py-5 px-8 rounded-[14dp] text-lg shadow-[0_8px_32px_rgba(196,192,255,0.2)] active:scale-95 transition-all duration-200">
          Enable Fingerprint
        </button>
<!-- Secondary Action: Ghost Style -->
<button class="w-full py-2 text-on-surface-variant font-label font-semibold tracking-wide hover:text-on-surface transition-colors duration-200">
          Maybe Later
        </button>
</div>
</div>
<!-- Security Assurance Banner (Bento-lite style) -->
<div class="mt-auto mb-10 w-full max-w-sm">
<div class="bg-surface-container-low p-4 rounded-xl flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="shield_lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<div class="flex-grow">
<div class="text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Privacy First</div>
<div class="text-sm text-on-surface/70">Biometric data never leaves this device.</div>
</div>
</div>
</div>
</main>
