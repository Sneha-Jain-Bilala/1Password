<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#ffdad6",
              "on-tertiary": "#68000f",
              "secondary-container": "#00d1a7",
              "surface": "#13121b",
              "surface-container-lowest": "#0e0d16",
              "on-surface": "#e5e0ee",
              "surface-container": "#201e28",
              "outline": "#918fa1",
              "surface-container-high": "#2a2933",
              "surface-container-highest": "#35333e",
              "error-container": "#93000a",
              "secondary": "#41eec2",
              "tertiary-container": "#f16161",
              "on-secondary": "#00382b",
              "primary-container": "#8781ff",
              "tertiary-fixed": "#ffdad8",
              "primary-fixed": "#e3dfff",
              "on-surface-variant": "#c7c4d8",
              "on-background": "#e5e0ee",
              "on-primary-fixed": "#100069",
              "surface-container-low": "#1c1a24",
              "primary-fixed-dim": "#c4c0ff",
              "surface-dim": "#13121b",
              "error": "#ffb4ab",
              "inverse-on-surface": "#312f39",
              "secondary-fixed-dim": "#28dfb5",
              "on-tertiary-container": "#5c000c",
              "surface-variant": "#35333e",
              "tertiary-fixed-dim": "#ffb3b0",
              "on-primary-container": "#1b0091",
              "on-secondary-fixed": "#002118",
              "secondary-fixed": "#55fcd0",
              "background": "#13121b",
              "tertiary": "#ffb3b0",
              "on-primary-fixed-variant": "#3622ca",
              "on-tertiary-fixed-variant": "#8c1520",
              "inverse-primary": "#4f44e2",
              "primary": "#c4c0ff",
              "surface-tint": "#c4c0ff",
              "outline-variant": "#464555",
              "on-secondary-container": "#005441",
              "surface-bright": "#3a3842",
              "inverse-surface": "#e5e0ee",
              "on-primary": "#2000a4",
              "on-tertiary-fixed": "#410006",
              "on-secondary-fixed-variant": "#00513f",
              "on-error": "#690005"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .logo-gradient {
            background: linear-gradient(135deg, #c4c0ff 0%, #41eec2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glow-ring {
            box-shadow: 0 0 60px 10px rgba(196, 192, 255, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center overflow-hidden">
<!-- Ambient Texture Layer -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[120px]"></div>
</div>
<!-- Main Splash Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center text-center p-8 w-full max-w-md">
<!-- Logo Container with Glowing Ring -->
<div class="relative mb-12 flex items-center justify-center group">
<!-- Pulsing outer ring -->
<div class="absolute w-48 h-48 rounded-full border border-primary/10 glow-ring scale-110"></div>
<div class="absolute w-40 h-40 rounded-full border border-primary/20 scale-100"></div>
<!-- Icon Background -->
<div class="relative w-32 h-32 bg-surface-container-high rounded-[28px] flex items-center justify-center shadow-2xl overflow-hidden">
<!-- Subtle internal gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent"></div>
<!-- Shield Icon -->
<span class="material-symbols-outlined text-7xl logo-gradient select-none" style="font-variation-settings: 'FILL' 1;">
                    shield_with_heart
                </span>
<!-- Inner Keyhole simulation via overlay if specific icon not available, using literal transcription -->
<div class="absolute bottom-9 text-surface text-[10px] font-bold">
<span class="material-symbols-outlined text-surface text-lg" style="font-variation-settings: 'FILL' 1;">key</span>
</div>
</div>
</div>
<!-- Brand Identity -->
<div class="space-y-4">
<h1 class="text-5xl font-extrabold tracking-tighter text-on-surface">
                VaultKey
            </h1>
<p class="text-on-surface-variant font-medium tracking-wide text-lg opacity-80">
                Your secrets, sealed.
            </p>
</div>
<!-- Loading / Progress Indicator (Implicit for Launch Screens) -->
<div class="mt-24 w-48 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="w-1/3 h-full bg-gradient-to-r from-primary to-secondary rounded-full"></div>
</div>
<!-- Security Badge Metadata -->
<div class="absolute bottom-12 flex flex-col items-center gap-2 opacity-40">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em] font-label">Military Grade Encryption</span>
</div>
<p class="text-[10px] font-label">v4.2.0-STABLE</p>
</div>
</main>
<!-- Navigation suppression check: This is a Splash screen (Transactional/Onboarding), 
         therefore TopAppBar and BottomNavBar are suppressed per "The Destination Rule". -->
<!-- Decorative Particle Simulation (CSS only approach) -->
<div class="absolute inset-0 pointer-events-none opacity-30">
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-primary rounded-full"></div>
<div class="absolute top-3/4 left-1/3 w-1.5 h-1.5 bg-secondary rounded-full"></div>
<div class="absolute top-1/3 right-1/4 w-1 h-1 bg-primary-container rounded-full"></div>
<div class="absolute bottom-1/4 right-1/3 w-2 h-2 bg-secondary-container/40 rounded-full blur-[1px]"></div>
</div>
</body></html>
